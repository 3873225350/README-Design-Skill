<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">README Design Skill cover</title>
  <desc id="desc">A GitHub README design system cover with a hero, cards, badges, and template blocks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.55" stop-color="#133B5C"/>
      <stop offset="1" stop-color="#0B6B5C"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#10A37F"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="36" fill="url(#bg)"/>
  <circle cx="1030" cy="90" r="170" fill="#38BDF8" opacity="0.12"/>
  <circle cx="190" cy="455" r="210" fill="#10A37F" opacity="0.12"/>
  <g transform="translate(92 88)">
    <rect x="0" y="0" width="520" height="328" rx="26" fill="#F8FAFC" filter="url(#shadow)"/>
    <rect x="34" y="34" width="94" height="18" rx="9" fill="#10A37F"/>
    <rect x="34" y="75" width="340" height="34" rx="17" fill="#111827"/>
    <rect x="34" y="128" width="430" height="16" rx="8" fill="#CBD5E1"/>
    <rect x="34" y="160" width="300" height="16" rx="8" fill="#E2E8F0"/>
    <g transform="translate(34 206)">
      <rect width="120" height="34" rx="17" fill="#DBEAFE"/>
      <rect x="138" width="120" height="34" rx="17" fill="#D1FAE5"/>
      <rect x="276" width="120" height="34" rx="17" fill="#FEF3C7"/>
    </g>
    <g transform="translate(34 268)">
      <rect width="88" height="18" rx="9" fill="#94A3B8"/>
      <rect x="112" width="140" height="18" rx="9" fill="#94A3B8"/>
      <rect x="276" width="110" height="18" rx="9" fill="#94A3B8"/>
    </g>
  </g>
  <g transform="translate(680 108)">
    <text x="0" y="0" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="800">README Design</text>
    <text x="0" y="52" fill="#CFFAFE" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">Make the repository homepage worth reading.</text>
    <g transform="translate(0 96)">
      <rect width="178" height="52" rx="18" fill="url(#accent)"/>
      <text x="28" y="34" fill="#052E2B" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">Hero</text>
      <rect x="200" width="178" height="52" rx="18" fill="#FFFFFF" opacity="0.14"/>
      <text x="228" y="34" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Badges</text>
      <rect x="400" width="178" height="52" rx="18" fill="#FFFFFF" opacity="0.14"/>
      <text x="428" y="34" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Proof</text>
    </g>
    <g transform="translate(0 184)">
      <rect width="250" height="88" rx="22" fill="#FFFFFF" opacity="0.13"/>
      <text x="24" y="36" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">11 templates</text>
      <text x="24" y="64" fill="#BAE6FD" font-family="Segoe UI, Arial, sans-serif" font-size="15">Product, research, profile...</text>
      <rect x="278" width="250" height="88" rx="22" fill="#FFFFFF" opacity="0.13"/>
      <text x="302" y="36" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">Non-AI copy</text>
      <text x="302" y="64" fill="#BAE6FD" font-family="Segoe UI, Arial, sans-serif" font-size="15">Specific, grounded, credible</text>
    </g>
  </g>
</svg>
